<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Browser-only Reef Recon DSP demonstration with local audio uploads."
    />
    <title>Reef Recon Live DSP Demo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=8a70440-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="spectrogram-stack" aria-label="Realtime spectrograms">
        <article class="visual-panel">
          <div class="panel-head">
            <span>Original</span>
            <span id="sourceReadout">44 kHz</span>
          </div>
          <div id="originalSpectrogramStage" class="spectrogram-stage">
            <canvas id="originalSpectrogram"></canvas>
            <div class="loop-overlay spectrogram-loop-overlay" aria-label="Loop range">
              <div class="loop-selection"></div>
              <button
                class="loop-handle loop-handle-start"
                type="button"
                role="slider"
                aria-label="Loop start"
              >
                <span></span>
              </button>
              <button
                class="loop-handle loop-handle-end"
                type="button"
                role="slider"
                aria-label="Loop end"
              >
                <span></span>
              </button>
            </div>
          </div>
        </article>

        <article class="visual-panel">
          <div class="panel-head">
            <span>Processed</span>
            <div class="spectrogram-actions">
              <button
                id="loopButton"
                class="loop-toggle"
                type="button"
                aria-pressed="false"
              >
                Loop
              </button>
              <span id="meterReadout">L 0.0 H 0.0</span>
            </div>
          </div>
          <div id="waveformStage" class="spectrogram-stage">
            <canvas id="processedSpectrogram"></canvas>
            <div
              id="loopOverlay"
              class="loop-overlay spectrogram-loop-overlay"
              aria-label="Loop range"
            >
              <div id="loopSelection" class="loop-selection"></div>
              <button
                id="loopStartHandle"
                class="loop-handle loop-handle-start"
                type="button"
                role="slider"
                aria-label="Loop start"
              >
                <span></span>
              </button>
              <button
                id="loopEndHandle"
                class="loop-handle loop-handle-end"
                type="button"
                role="slider"
                aria-label="Loop end"
              >
                <span></span>
              </button>
            </div>
          </div>
        </article>
      </section>

      <aside class="side-rack" aria-label="Monitor and controls">
        <article class="visual-panel waveform-panel">
          <div class="panel-head">
            <span id="waveformTitle">Processed waveform</span>
            <span id="timeReadout">0.00s</span>
          </div>
          <div class="waveform-stage">
            <canvas id="waveformCanvas"></canvas>
          </div>
        </article>

        <section class="control-dock">
          <div class="transport">
            <p id="statusText" class="status-line">loading WebAssembly DSP</p>
            <select id="fileSelect" aria-label="Example audio file"></select>
            <label class="upload-button" for="uploadInput">
              <span>Upload audio</span>
              <input id="uploadInput" type="file" accept="audio/*,.wav,.flac,.mp3,.m4a,.aac,.ogg" />
            </label>
            <div class="progress-track" aria-hidden="true">
              <span id="progressBar"></span>
            </div>
            <div class="transport-buttons">
              <button
                id="bypassButton"
                class="bypass-button"
                type="button"
                aria-pressed="false"
              >
                Processed
              </button>
              <button id="powerButton" type="button" disabled>Play</button>
            </div>
          </div>

          <section
            class="control-surface"
            id="controlSurface"
            aria-label="Parameters"
          ></section>

          <p class="privacy-note">
            Processing stays in this browser. Uploaded files are not sent anywhere.
          </p>
        </section>
      </aside>
    </main>

    <script type="module" src="./app.js?v=8a70440-2"></script>
  </body>
</html>
